<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin & Earn</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 400px; background: #1e1e1e; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h1 { color: #4CAF50; font-size: 24px; }
        .stats-box { display: flex; justify-content: space-between; background: #2d2d2d; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        .wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #4CAF50; transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); background: conic-gradient(#e74c3c 0deg 60deg, #3498db 60deg 120deg, #f1c40f 120deg 180deg, #2ecc71 180deg 240deg, #9b59b6 240deg 300deg, #1abc9c 300deg 360deg); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; z-index: 10; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:disabled { background: #555; cursor: not-allowed; }
        .info-text { font-size: 14px; color: #bbb; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Lucky Spin & Earn</h1>
    <div class="stats-box">
        <div>💰 پوائنٹس: <span id="userPoints">0</span></div>
        <div>🔄 باقی اسپن: <span id="spinCount">2</span></div>
    </div>
        <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <button id="spinBtn" onclick="spinWheel()">🔄 اسپن گھمائیں</button>
    <button id="watchBtn" onclick="watchAd()" style="background: #3498db; display: none;">📺 2 ویڈیوز دیکھیں (+1 اسپن)</button>

    <div class="info-text" id="statusMsg">روزانہ 2 فری اسپن ملیں گے!</div>
    <div class="info-text" style="color: #666; font-size: 12px;">آج کے حاصل کردہ پوائنٹس: <span id="dailyPoints">0</span> / 2000</div>

    <hr style="border: 1px solid #333; margin: 20px 0;">

    <!-- ودڈرا سیکشن -->
    <div id="withdrawSection" style="display: none; background: #252525; padding: 15px; border-radius: 10px;">
        <h3 style="color: #f1c40f; margin-top: 0;">🎁 مبارک ہو! 10,000 پوائنٹس پورے ہو گئے</h3>
        <p style="font-size: 14px;">نیچے اپنا ایزی پیسہ / جیز کیش نمبر لکھ کر ودڈرا کریں۔</p>
        <input type="text" id="walletName" placeholder="اکاؤنٹ ہولڈر کا نام" style="width:90%; padding:8px; margin-bottom:10px; border-radius:5px; border:none;"><br>
        <input type="text" id="walletNumber" placeholder="ایزی پیسہ / جیز کیش نمبر" style="width:90%; padding:8px; margin-bottom:10px; border-radius:5px; border:none;"><br>
        <button onclick="requestWithdraw()" style="background: #e67e22;">💸 واٹس ایپ پر کلیم بھیجیں</button>
    </div>
</div>
<script>
    // لوکل اسٹوریج سے ڈیٹا لوڈ کرنا
    let points = parseInt(localStorage.getItem('spin_points')) || 0;
    let remainingSpins = parseInt(localStorage.getItem('remaining_spins'));
    let dailyPoints = parseInt(localStorage.getItem('daily_points')) || 0;
    let lastSpinDate = localStorage.getItem('last_spin_date') || "";
    let watchedAdsCount = parseInt(localStorage.getItem('watched_ads_count')) || 0;

    // تاریخ چیک کرنا (روزانہ ری سیٹ کرنے کے لیے)
    let today = new Date().toDateString();
    if (lastSpinDate !== today) {
        remainingSpins = 2; // روزانہ 2 فری اسپن
        dailyPoints = 0;
        watchedAdsCount = 0;
        localStorage.setItem('last_spin_date', today);
    }
    if (isNaN(remainingSpins)) remainingSpins = 2;

    // اسکرین پر ڈیٹا اپڈیٹ کرنا
    function updateUI() {
        document.getElementById('userPoints').innerText = points;
        document.getElementById('spinCount').innerText = remainingSpins;
        document.getElementById('dailyPoints').innerText = dailyPoints;

        if (remainingSpins > 0) {
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('watchBtn').style.display = 'none';
        } else {
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('watchBtn').style.display = 'block';
            document.getElementById('statusMsg').innerText = `باقی اسپن ختم! 2 ویڈیوز دیکھ کر 1 اسپن حاصل کریں۔ (دیکھی گئی ویڈیوز: ${watchedAdsCount}/2)`;
        }

        // اگر 10 ہزار پوائنٹس ہو گئے تو ودڈرا کھولیں
        if (points >= 10000) {
            document.getElementById('withdrawSection').style.display = 'block';
        }
    }

    // اسپن گھمانے کا فنکشن
    function spinWheel() {
        if (remainingSpins <= 0) return;
        if (dailyPoints >= 2000) {
            alert('❌ آپ کی آج کی 2000 پوائنٹس کی حد پوری ہو چکی ہے! کل دوبارہ کوشش کریں۔');
            return;
        }

        document.getElementById('spinBtn').disabled = true;
        remainingSpins--;
        localStorage.setItem('remaining_spins', remainingSpins);

        let degrees = Math.floor(Math.random() * 360) + 1440; // کم از کم 4 چکر
        document.getElementById('wheel').style.transform = `rotate(${degrees}deg)`;

        setTimeout(() => {
            // پوائنٹس کا فیصلہ کرنا (6 حصے ہیں)
            let values = [10, 50, 20, 100, 30, 50];
            let actualDegree = degrees % 360;
            let index = Math.floor(actualDegree / 60);
            let wonPoints = values[index] || 20;

            // پوائنٹس جمع کرنا
            points += wonPoints;
            dailyPoints += wonPoints;

            localStorage.setItem('spin_points', points);
            localStorage.setItem('daily_points', dailyPoints);

            alert(`🎉 مبارک ہو! آپ نے ${wonPoints} پوائنٹس جیتے!`);
            updateUI();
        }, 4000);
    }
        // ویڈیو ایڈ دیکھنے کا فنکشن
    function watchAd() {
        // یہاں ابھی عارضی ایڈ پاپ اپ ہے، بعد میں ادھر اصلی ایڈ کا کوڈ آئے گا
        alert("📺 ایڈ (ویڈیو) لوڈ ہو رہی ہے... براہ کرم 5 سیکنڈ دیکھیں اور بند نہ کریں۔");
        
        setTimeout(() => {
            watchedAdsCount++;
            localStorage.setItem('watched_ads_count', watchedAdsCount);

            if (watchedAdsCount >= 2) {
                remainingSpins += 1;
                watchedAdsCount = 0;
                localStorage.setItem('remaining_spins', remainingSpins);
                localStorage.setItem('watched_ads_count', watchedAdsCount);
                alert("✅ آپ نے 2 ویڈیوز دیکھ لیں۔ آپ کو 1 اضافی اسپن مل گیا ہے!");
            } else {
                alert(`آدھا ٹارگٹ پورا! 1 اور ویڈیو دیکھیں تو اسپن ملے گا۔ (${watchedAdsCount}/2)`);
            }
            updateUI();
        }, 3000);
    }

    // واٹس ایپ پر ودڈرا کلیم بھیجنے کا فنکشن
    function requestWithdraw() {
        let name = document.getElementById('walletName').value;
        let number = document.getElementById('walletNumber').value;

        if (!name || !number) {
            alert('براہ کرم اپنا نام اور نمبر صحیح لکھیں!');
            return;
        }

        let adminWhatsApp = "923001234567"; // 👈 یہاں اپنا اصلی واٹس ایپ نمبر لکھیں (بغیر پلس سائن کے)
        let message = `السلام علیکم عاصم بھائی،\n\nمیں نے Lucky Spin ایپ پر 10,000 پوائنٹس پورے کر لیے ہیں۔ میرا ودڈرا کلیم یہ ہے:\n\n👤 نام: ${name}\n📱 نمبر: ${number}\n💰 کل پوائنٹس: ${points}`;
        
        let url = `https://api.whatsapp.com/send?phone=${adminWhatsApp}&text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }

    // ایپ لوڈ ہوتے ہی سسٹم چلانا
    updateUI();
</script>
</body>
</html>
